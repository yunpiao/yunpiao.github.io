  <div class="article-content">
    <div class="entry">
      
        <blockquote>
<p>使用goconfig 读取ini 配置文件</p>
</blockquote>
<a id="more"></a>
<h2 id="安装"><a href="#安装" class="headerlink" title="安装"></a>安装</h2><blockquote>
<p>go get github.com/Unknwon/goconfig</p>
</blockquote>
<h2 id="使用方法"><a href="#使用方法" class="headerlink" title="使用方法"></a>使用方法</h2><h3 id="加载配置文件"><a href="#加载配置文件" class="headerlink" title="加载配置文件"></a>加载配置文件</h3><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line">cfg, err := goconfig.LoadConfigFile(<span class="string">"conf.ini"</span>)</div><div class="line"><span class="keyword">if</span> err != <span class="literal">nil</span>&#123;</div><div class="line">	<span class="built_in">panic</span>(<span class="string">"错误"</span>)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<figure class="highlight ini"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div></pre></td><td class="code"><pre><div class="line"><span class="section">[mysql]</span></div><div class="line"><span class="attr">username</span>=root</div><div class="line"><span class="attr">password</span>=<span class="number">123456</span></div><div class="line"><span class="attr">url</span>=(<span class="number">127.0</span>.<span class="number">0.1</span>:<span class="number">3306</span>)/baidu</div><div class="line"><span class="section">[redis]</span></div><div class="line"><span class="attr">address</span>=<span class="number">127.0</span>.<span class="number">0.1</span>:<span class="number">6379</span></div></pre></td></tr></table></figure>
<h3 id="读取"><a href="#读取" class="headerlink" title="读取"></a>读取</h3><h4 id="读取单个值"><a href="#读取单个值" class="headerlink" title="读取单个值"></a>读取单个值</h4><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line">value, err := cfg.GetValue(<span class="string">"mysql"</span>, <span class="string">"username"</span>)</div><div class="line">valut, err := cfg.Int(<span class="string">"must"</span>, <span class="keyword">int</span>)</div></pre></td></tr></table></figure>
<h4 id="读取整个区"><a href="#读取整个区" class="headerlink" title="读取整个区"></a>读取整个区</h4><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">sec err :== Cfg.GeSecion(<span class="string">"mysql"</span>)</div></pre></td></tr></table></figure>
