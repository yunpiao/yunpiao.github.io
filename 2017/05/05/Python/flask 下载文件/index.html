<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div></pre></td><td class="code"><pre><div class="line"><span class="meta">@api.route('/save_csv', methods=['GET'])</span></div><div class="line"><span class="function"><span class="keyword">def</span> <span class="title">save_excel</span><span class="params">()</span>:</span></div><div class="line">	<span class="keyword">if</span> request.method == <span class="string">'GET'</span>:</div><div class="line">		device_id = request.args.get(<span class="string">'device_id'</span>, <span class="number">0</span>, type=int)</div><div class="line">		<span class="keyword">if</span> device_id &gt; <span class="number">0</span>:</div><div class="line">			csv_path = current_app.config[<span class="string">'CSV_PATH'</span>]  <span class="comment"># 使用相对路径保存文件</span></div><div class="line">			device = Devices.query.filter_by(id=device_id).first()</div><div class="line">			check_res_strings = &#123;<span class="number">0</span>: <span class="string">''</span>, <span class="number">1</span>: <span class="string">'安全'</span>, <span class="number">2</span>: <span class="string">'危险'</span>, <span class="number">3</span>: <span class="string">'注意'</span>&#125;</div><div class="line">			filename = <span class="string">'assess_result.csv'</span></div><div class="line">			results = Result.query.filter_by(device_id=device_id).all()</div><div class="line">			<span class="keyword">with</span> open(csv_path + filename, <span class="string">'wb'</span>) <span class="keyword">as</span> csvfile:</div><div class="line">				spamwriter = csv.writer(csvfile, dialect=<span class="string">'excel'</span>)</div><div class="line">				spamwriter.writerow([<span class="string">''</span>, <span class="string">'目标地址'</span>, <span class="string">'设备类型'</span>, <span class="string">'威胁统计'</span>])</div><div class="line">				spamwriter.writerow([<span class="string">''</span>, device.ip_address, device.device_type, device.assess_proportion])</div><div class="line">				spamwriter.writerow([])</div><div class="line">				spamwriter.writerow([])</div><div class="line">				spamwriter.writerow(</div><div class="line">					[<span class="string">'chapter'</span>, <span class="string">'check_result'</span>, <span class="string">'title'</span>, <span class="string">'description'</span>, <span class="string">'audit'</span>, <span class="string">'remediation'</span>, <span class="string">'level'</span>])</div><div class="line">				<span class="keyword">for</span> r <span class="keyword">in</span> results:</div><div class="line">					spamwriter.writerow(</div><div class="line">						[r.chapter, check_res_strings[r.check_result], r.title, r.description, r.audit, r.remediation</div><div class="line">							, r.level])</div><div class="line"></div><div class="line">			response = make_response(send_file(csv_path + filename))</div><div class="line">			response.headers[<span class="string">"Content-Disposition"</span>] = <span class="string">"attachment; filename=assess_result.csv;"</span></div><div class="line">			<span class="keyword">return</span> response</div></pre></td></tr></table></figure>
